<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ludo Game</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
font-family:sans-serif;
}

.board{
width:600px;
height:600px;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
border:5px solid #000;
}

.cell{
border:1px solid #999;
}

.red{background:#d32f2f;}
.green{background:#388e3c;}
.yellow{background:#fbc02d;}
.blue{background:#1976d2;}
.white{background:#ffffff;}
.safe{background:#ccc;}

.home{
display:flex;
justify-content:center;
align-items:center;
}

.home-box{
width:80%;
height:80%;
background:#fff;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:10px;
padding:10px;
}

.token{
width:100%;
height:100%;
border-radius:50%;
}

.center{
grid-column:7/10;
grid-row:7/10;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
}

.center div:nth-child(1){background:#d32f2f;}
.center div:nth-child(2){background:#388e3c;}
.center div:nth-child(3){background:#1976d2;}
.center div:nth-child(4){background:#fbc02d;}
</style>
</head>
<body>

<div class="board">

<!-- Red Home -->
<div class="red home" style="grid-column:1/7;grid-row:1/7;">
<div class="home-box">
<div class="token red"></div>
<div class="token red"></div>
<div class="token red"></div>
<div class="token red"></div>
</div>
</div>

<!-- Green Home -->
<div class="green home" style="grid-column:10/16;grid-row:1/7;">
<div class="home-box">
<div class="token green"></div>
<div class="token green"></div>
<div class="token green"></div>
<div class="token green"></div>
</div>
</div>

<!-- Blue Home -->
<div class="blue home" style="grid-column:1/7;grid-row:10/16;">
<div class="home-box">
<div class="token blue"></div>
<div class="token blue"></div>
<div class="token blue"></div>
<div class="token blue"></div>
</div>
</div>

<!-- Yellow Home -->
<div class="yellow home" style="grid-column:10/16;grid-row:10/16;">
<div class="home-box">
<div class="token yellow"></div>
<div class="token yellow"></div>
<div class="token yellow"></div>
<div class="token yellow"></div>
</div>
</div>

<!-- Path -->
<script>
for(let i=0;i<225;i++){
let cell=document.createElement("div");
cell.className="cell white";
document.querySelector(".board").appendChild(cell);
}
</script>

<!-- Center -->
<div class="center">
<div></div>
<div></div>
<div></div>
<div></div>
</div>

</div>

</body>
</html>
